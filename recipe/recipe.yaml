# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.8.2"
  python_check_max: "3.14"

package:
  name: openapi-spec-validator
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/o/openapi-spec-validator/openapi_spec_validator-${{ version }}.tar.gz
  sha256: f12c9fe77d78ea0a04fe931573cfe4b86478db12f09f7f3a08a41da59b005458

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - openapi-spec-validator = openapi_spec_validator.__main__:main

requirements:
  host:
    - pip
    - poetry-core >=2.0.0,<3.0.0
    - python ${{ python_min }}.*
  run:
    - jsonschema >=4.24.0,<4.25.0
    - jsonschema-path >=0.4.2,<0.5.0
    - lazy-object-proxy >=1.7.1,<2.0
    - openapi-schema-validator >=0.7.0,<0.8.0
    - python >=${{ python_min }}

tests:
  - python:
      imports: openapi_spec_validator
      python_version:
        - ${{ python_min }}.*
        - ${{ python_check_max }}.*
  - files:
      source:
        - tests
    requirements:
      run:
        - pytest-cov
        - python ${{ python_min }}.*
    script:
      - openapi-spec-validator --help
      - coverage run --source=openapi_spec_validator --branch -m pytest -vv --tb=long --color=yes
      - coverage report --show-missing --skip-covered --fail-under=92

about:
  license: Apache-2.0
  summary: OpenAPI 2.0 (aka Swagger) and OpenAPI 3 spec validator
  license_file: LICENSE
  homepage: https://pypi.org/project/openapi-spec-validator
  repository: https://github.com/p1c2u/openapi-spec-validator
  description: |-
    OpenAPI Spec Validator is a Python library that validates OpenAPI Specs
    against the OpenAPI 2.0 (aka Swagger) and OpenAPI 3.0 specification. The
    validator aims to check for full compliance with the Specification.

extra:
  recipe-maintainers:
    - rvalieris
    - bollwyvl
